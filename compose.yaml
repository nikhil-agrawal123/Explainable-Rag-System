services:
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped

  dataforge:
    build: .
    container_name: dataforge
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - OLLAMA_HOST=http://ollama:11434
      - LOG_LEVEL=INFO
    volumes:
      - dataforge_data:/app/data
    entrypoint: /app/entrypoint.sh
    depends_on:
      - ollama
    restart: unless-stopped

volumes:
  ollama_data:
  dataforge_data:
